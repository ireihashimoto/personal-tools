<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Irei — Workout Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fdf6ec;--bg2:#f7ede0;--bg3:#f0e4d0;--bg4:#e8d8be;
  --border:#dccaa8;--border2:#c8b490;
  --text:#1c1510;--text2:#3a2e22;--text3:#6e5e48;--text4:#9e8c74;--text5:#c8b490;
  --acc:#166534;--neg:#dc2626;--navy:#1e3a5f;
  --font-serif:'DM Serif Display',serif;--font-mono:'DM Mono',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-mono);min-height:100vh;padding:2rem 1.5rem 4rem}
.header{border-bottom:1px solid var(--border2);padding-bottom:1.5rem;margin-bottom:2rem;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:1rem}
.eyebrow{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text4);margin-bottom:6px}
h1{font-family:var(--font-serif);font-style:italic;font-size:30px;color:var(--text)}
.header-actions{display:flex;gap:8px}
.lbl{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text4);margin-bottom:.9rem;padding-bottom:7px;border-bottom:1px solid var(--border);margin-top:2rem}
.lbl:first-of-type{margin-top:0}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border2);margin-bottom:0}
.tab{font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:8px 16px;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-1px;background:transparent;border-top:none;border-left:none;border-right:none;font-family:var(--font-mono);transition:all .15s}
.tab.active{color:var(--text);border-bottom-color:var(--acc)}
.tab-content{display:none;padding-top:1.5rem}.tab-content.visible{display:block}

/* BUTTONS */
.btn{font-family:var(--font-mono);font-size:11px;padding:5px 12px;border-radius:2px;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-green{background:var(--acc);color:#fff;border:1px solid var(--acc)}.btn-green:hover{opacity:.85}
.btn-outline{background:transparent;color:var(--text3);border:1px solid var(--border2)}.btn-outline:hover{color:var(--text);border-color:var(--text3)}
.btn-danger{background:transparent;color:var(--neg);border:1px solid rgba(220,38,38,.3)}.btn-danger:hover{background:rgba(220,38,38,.06)}
.btn-sm{font-size:10px;padding:3px 8px}

/* PROGRAM BUILDER */
.program-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:2rem}
.day-card{background:var(--bg2);border:1px solid var(--border2);border-radius:2px;overflow:hidden}
.day-header{padding:.8rem 1rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.day-name{font-family:var(--font-serif);font-style:italic;font-size:18px;color:var(--text)}
.day-actions{display:flex;gap:5px}
.exercise-list{padding:.5rem .5rem .8rem}
.exercise-item{display:flex;align-items:center;gap:8px;padding:7px 8px;background:var(--bg3);border:1px solid var(--border);border-radius:2px;margin-bottom:4px;cursor:grab;transition:background .15s;user-select:none}
.exercise-item:hover{background:var(--bg4)}
.exercise-item.dragging{opacity:.4;cursor:grabbing}
.exercise-item.drag-over{border-color:var(--acc);background:rgba(22,101,52,.08)}
.drag-handle{color:var(--text4);font-size:14px;cursor:grab;flex-shrink:0;line-height:1;padding:2px 2px}
.exercise-name{flex:1;font-size:12px;color:var(--text2)}
.exercise-del{background:transparent;border:none;color:var(--text5);cursor:pointer;font-size:13px;padding:0 3px;transition:color .15s}
.exercise-del:hover{color:var(--neg)}
.add-exercise-row{display:flex;gap:6px;padding:.5rem .5rem 0}
.ex-input{flex:1;background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:var(--font-mono);font-size:11px;padding:5px 8px;border-radius:2px;outline:none}
.ex-input::placeholder{color:var(--text4)}.ex-input:focus{border-color:var(--text3)}
.add-day-row{display:flex;gap:8px;margin-bottom:2rem}
.day-input{flex:1;background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:var(--font-mono);font-size:12px;padding:8px 12px;border-radius:2px;outline:none}
.day-input::placeholder{color:var(--text4)}.day-input:focus{border-color:var(--text3)}

/* LOG */
.log-day-sel{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:2rem}
.day-btn{background:var(--bg2);border:1px solid var(--border2);border-radius:2px;padding:12px;cursor:pointer;text-align:left;transition:background .15s;font-family:var(--font-mono)}
.day-btn:hover{background:var(--bg3)}
.day-btn.selected{border-color:var(--acc);background:rgba(22,101,52,.06)}
.day-btn-name{font-family:var(--font-serif);font-style:italic;font-size:16px;color:var(--text);margin-bottom:3px}
.day-btn-count{font-size:11px;color:var(--text3)}
.log-form{background:var(--bg2);border:1px solid var(--border2);border-radius:2px;padding:1.2rem;margin-bottom:2rem}
.log-date-row{display:flex;align-items:center;gap:10px;margin-bottom:1rem;flex-wrap:wrap}
.log-date-row label{font-size:12px;color:var(--text3)}
.fdate{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);font-family:var(--font-mono);font-size:12px;padding:6px 10px;border-radius:2px;outline:none}
.exercise-log-block{margin-bottom:1.2rem;padding-bottom:1.2rem;border-bottom:1px solid var(--border)}
.exercise-log-block:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.ex-log-name{font-size:13px;color:var(--text);margin-bottom:8px;font-weight:500}
.sets-table{width:100%;border-collapse:collapse;margin-bottom:6px;font-size:12px}
.sets-table th{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text4);padding:4px 8px;text-align:left;border-bottom:1px solid var(--border)}
.sets-table td{padding:5px 8px;border-bottom:1px solid var(--border);color:var(--text2)}
.sets-table tr:last-child td{border-bottom:none}
.set-input{width:70px;background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:var(--font-mono);font-size:12px;padding:4px 6px;border-radius:2px;outline:none;text-align:center}
.set-input:focus{border-color:var(--text3)}
.set-del{background:transparent;border:none;color:var(--text5);cursor:pointer;font-size:13px;padding:0 3px;transition:color .15s}
.set-del:hover{color:var(--neg)}
.add-set-btn{font-size:11px;color:var(--acc);background:transparent;border:none;cursor:pointer;font-family:var(--font-mono);padding:3px 0;transition:opacity .15s}
.add-set-btn:hover{opacity:.7}

/* HISTORY */
.history-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:2rem}
.history-card{background:var(--bg2);border:1px solid var(--border2);border-radius:2px;padding:1.2rem;cursor:pointer;transition:background .15s}
.history-card:hover{background:var(--bg3)}
.history-ex-name{font-family:var(--font-serif);font-style:italic;font-size:18px;color:var(--text);margin-bottom:4px}
.history-meta{font-size:11px;color:var(--text3);margin-bottom:10px}
.mini-chart{height:40px;position:relative;margin-top:4px}
.history-detail{background:var(--bg2);border:1px solid var(--border2);border-radius:2px;padding:1.2rem;margin-bottom:2rem;display:none}
.history-detail.visible{display:block}
.chart-wrap{position:relative;width:100%;height:180px;margin:1rem 0}
.session-log{margin-top:1rem}
.session-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;color:var(--text2)}
.session-row:last-child{border-bottom:none}
.session-date{color:var(--text3)}
.session-best{font-weight:500;color:var(--text)}

/* MODAL */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(28,21,16,.5);z-index:100;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.open{display:flex}
.modal{background:var(--bg);border:1px solid var(--border2);border-radius:2px;padding:1.5rem;width:100%;max-width:400px}
.modal h2{font-family:var(--font-serif);font-style:italic;font-size:20px;margin-bottom:1rem;color:var(--text)}
.modal-close{float:right;background:transparent;border:none;color:var(--text3);font-size:20px;cursor:pointer;margin-top:-4px}
.modal-input{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:var(--font-mono);font-size:12px;padding:8px 12px;border-radius:2px;outline:none;margin-bottom:10px}
.modal-input:focus{border-color:var(--text3)}
.modal-actions{display:flex;gap:8px;margin-top:1rem}

.empty-state{text-align:center;padding:3rem 1rem;color:var(--text3);font-size:12px;border:1px dashed var(--border2);border-radius:2px;margin-bottom:2rem}
.empty-title{font-family:var(--font-serif);font-style:italic;font-size:20px;color:var(--text2);margin-bottom:8px}

.foot{font-size:10px;color:var(--text5);text-align:center;padding-top:1.5rem;border-top:1px solid var(--border);letter-spacing:.06em;margin-top:1rem}
@media(max-width:500px){body{padding:1.2rem 1rem 3rem}.program-grid{grid-template-columns:1fr}.history-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="eyebrow">Irei Hashimoto</div>
    <h1>Workout Tracker</h1>
  </div>
  <div class="header-actions">
    <button class="btn btn-outline" onclick="switchTab('program')">Edit program</button>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('log')">Log workout</button>
  <button class="tab" onclick="switchTab('history')">History</button>
  <button class="tab" onclick="switchTab('weight')">Log weight</button>
  <button class="tab" onclick="switchTab('weighthistory')">Weight history</button>
  <button class="tab" onclick="switchTab('program')">Program</button>
</div>

<!-- LOG TAB -->
<div class="tab-content visible" id="tab-log">
  <div class="lbl">Select day</div>
  <div class="log-day-sel" id="logDaySel"></div>
  <div id="logForm"></div>
</div>

<!-- HISTORY TAB -->
<div class="tab-content" id="tab-history">
  <div class="lbl">Exercise history</div>
  <div class="history-detail" id="historyDetail"></div>
  <div class="history-grid" id="historyGrid"></div>
</div>

<!-- WEIGHT LOG TAB -->
<div class="tab-content" id="tab-weight">
  <div class="lbl">Log bodyweight</div>
  <div class="log-form" style="max-width:400px">
    <div class="log-date-row" style="margin-bottom:1rem">
      <label>Date</label>
      <input class="fdate" id="weightDate" type="date">
    </div>
    <div class="log-date-row" style="margin-bottom:1.2rem">
      <label>Weight (lbs)</label>
      <input class="set-input" id="weightValue" type="number" placeholder="0" min="0" step="0.1" style="width:100px;font-size:16px;padding:6px 10px">
    </div>
    <button class="btn btn-green" onclick="saveWeight()" style="width:100%">Log weight</button>
  </div>
  <div class="lbl" style="margin-top:2rem">Recent entries</div>
  <div id="weightLog"></div>
</div>

<!-- WEIGHT HISTORY TAB -->
<div class="tab-content" id="tab-weighthistory">
  <div class="lbl">Bodyweight history</div>
  <div id="weightHistoryContent"></div>
</div>

<!-- PROGRAM TAB -->
<div class="tab-content" id="tab-program">
  <div class="lbl">Add a training day</div>
  <div class="add-day-row">
    <input class="day-input" id="newDayName" placeholder="Day name — e.g. Upper A, Lower, Push..." type="text">
    <button class="btn btn-green" onclick="addDay()">Add day</button>
  </div>
  <div class="lbl">Your program</div>
  <div id="programGrid"></div>
</div>

<!-- RENAME MODAL -->
<div class="modal-overlay" id="renameModal">
  <div class="modal">
    <button class="modal-close" onclick="closeRename()">×</button>
    <h2>Rename day</h2>
    <input type="hidden" id="renameDayId">
    <input class="modal-input" id="renameInput" type="text" placeholder="New name">
    <div class="modal-actions">
      <button class="btn btn-green" onclick="saveRename()" style="flex:1">Save</button>
      <button class="btn btn-outline" onclick="closeRename()">Cancel</button>
    </div>
  </div>
</div>

<div class="foot">irei hashimoto · workout tracker</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const DEFAULT={days:[],sessions:[]};
const SUPA_URL='https://fcgdemqeyuriwqjtvkmr.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZjZ2RlbXFleXVyaXdxanR2a21yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MDIzODYsImV4cCI6MjA5MzE3ODM4Nn0.CQ5y4oKZliCBGDRe1smBOg0g4llv0OE7nxdY1tLE-CY';
const SUPA_HEADERS={'Content-Type':'application/json','apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Prefer':'resolution=merge-duplicates'};

async function load(){
  try{
    const r=await fetch(`${SUPA_URL}/rest/v1/workout_data?id=eq.main&select=data`,{headers:SUPA_HEADERS});
    const rows=await r.json();
    if(rows&&rows.length>0&&rows[0].data) return rows[0].data;
  }catch(e){console.log('Load failed',e);}
  return JSON.parse(JSON.stringify(DEFAULT));
}

async function persist(){
  try{
    await fetch(`${SUPA_URL}/rest/v1/workout_data`,{method:'POST',headers:SUPA_HEADERS,body:JSON.stringify({id:'main',data,updated_at:new Date().toISOString()})});
  }catch(e){console.log('Save failed',e);}
}
let data=load();
let selectedDayId=null;
let selectedHistoryEx=null;
let dragSrc=null;

// ── TABS ──
function switchTab(name){
  const ids=['log','history','weight','weighthistory','program'];
  document.querySelectorAll('.tab').forEach((t,i)=>{t.className='tab'+(ids[i]===name?' active':'');});
  document.querySelectorAll('.tab-content').forEach(c=>{c.className='tab-content'+(c.id==='tab-'+name?' visible':'');});
  if(name==='log')renderLog();
  if(name==='history')renderHistory();
  if(name==='weight'){renderWeightLog();document.getElementById('weightDate').valueAsDate=new Date();}
  if(name==='weighthistory')renderWeightHistory();
  if(name==='program')renderProgram();
}

// ── WEIGHT ──
function saveWeight(){
  const date=document.getElementById('weightDate').value;
  const val=parseFloat(document.getElementById('weightValue').value);
  if(!date||!val||val<=0)return;
  if(!data.weights)data.weights=[];
  const existing=data.weights.findIndex(w=>w.date===date);
  if(existing>=0)data.weights[existing].weight=val;
  else data.weights.push({id:uid(),date,weight:val});
  data.weights.sort((a,b)=>new Date(b.date)-new Date(a.date));
  persist();
  document.getElementById('weightValue').value='';
  renderWeightLog();
}

function deleteWeight(id){
  data.weights=data.weights.filter(w=>w.id!==id);
  persist();renderWeightLog();
}

function renderWeightLog(){
  if(!data.weights)data.weights=[];
  const container=document.getElementById('weightLog');
  const recent=data.weights.slice(0,20);
  if(recent.length===0){container.innerHTML='<div class="empty-state">No entries yet. Log your weight above.</div>';return;}
  container.innerHTML=recent.map(w=>`
    <div class="session-row">
      <span class="session-date">${new Date(w.date+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'})}</span>
      <span class="session-best">${w.weight} lbs</span>
      <button class="set-del" onclick="deleteWeight('${w.id}')">×</button>
    </div>`).join('');
}

let weightChartObj=null;
function renderWeightHistory(){
  if(!data.weights)data.weights=[];
  const container=document.getElementById('weightHistoryContent');
  if(data.weights.length===0){
    container.innerHTML='<div class="empty-state"><div class="empty-title">No data yet</div>Log your weight in the Log weight tab to see your history here.</div>';
    return;
  }
  const sorted=[...data.weights].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const labels=sorted.map(w=>new Date(w.date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}));
  const weights=sorted.map(w=>w.weight);
  const min=Math.min(...weights);
  const max=Math.max(...weights);
  const start=weights[0];
  const current=weights[weights.length-1];
  const change=current-start;

  container.innerHTML=`
    <div class="stat-row" style="margin-bottom:1.5rem">
      <div class="stat"><div class="sl">Current</div><div class="sv">${current}</div><div class="ss">lbs</div></div>
      <div class="stat"><div class="sl">Starting</div><div class="sv">${start}</div><div class="ss">lbs</div></div>
      <div class="stat"><div class="sl">Change</div><div class="sv ${change<0?'pos':change>0?'neg':''}">${change>=0?'+':''}${change.toFixed(1)}</div><div class="ss">lbs total</div></div>
      <div class="stat"><div class="sl">Low</div><div class="sv pos">${min}</div><div class="ss">lbs</div></div>
      <div class="stat"><div class="sl">High</div><div class="sv">${max}</div><div class="ss">lbs</div></div>
      <div class="stat"><div class="sl">Entries</div><div class="sv">${sorted.length}</div><div class="ss">logged</div></div>
    </div>
    <div style="background:var(--bg2);border:1px solid var(--border2);border-radius:2px;padding:1.2rem;margin-bottom:2rem">
      <div class="chart-wrap"><canvas id="weightChart"></canvas></div>
    </div>
  `;

  setTimeout(()=>{
    if(weightChartObj)weightChartObj.destroy();
    const ctx=document.getElementById('weightChart');
    if(!ctx)return;
    weightChartObj=new Chart(ctx,{
      type:'line',
      data:{labels,datasets:[{label:'Bodyweight (lbs)',data:weights,borderColor:'#166534',backgroundColor:'rgba(22,101,52,.08)',borderWidth:2,pointBackgroundColor:'#166534',pointRadius:3,tension:.3,fill:true}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'#f7ede0',borderColor:'#c8b490',borderWidth:1,titleColor:'#6e5e48',bodyColor:'#1c1510',callbacks:{label:c=>` ${c.parsed.y} lbs`}}},scales:{x:{ticks:{color:'#9e8c74',font:{size:10,family:'DM Mono'}},grid:{color:'#dccaa8'}},y:{ticks:{color:'#9e8c74',font:{size:10,family:'DM Mono'},callback:v=>v+'lbs'},grid:{color:'#dccaa8'}}}}
    });
  },100);
}

// ── PROGRAM ──
function addDay(){
  const name=document.getElementById('newDayName').value.trim();
  if(!name)return;
  data.days.push({id:uid(),name,exercises:[]});
  persist();document.getElementById('newDayName').value='';renderProgram();
}

function deleteDay(id){
  if(!confirm('Remove this day and all its exercises?'))return;
  data.days=data.days.filter(d=>d.id!==id);persist();renderProgram();
}

function addExercise(dayId){
  const input=document.getElementById('ex-input-'+dayId);
  const name=input.value.trim();
  if(!name)return;
  const day=data.days.find(d=>d.id===dayId);
  if(day){day.exercises.push({id:uid(),name});}
  persist();input.value='';renderProgram();
}

function deleteExercise(dayId,exId){
  const day=data.days.find(d=>d.id===dayId);
  if(day)day.exercises=day.exercises.filter(e=>e.id!==exId);
  persist();renderProgram();
}

function openRename(dayId){
  const day=data.days.find(d=>d.id===dayId);
  document.getElementById('renameDayId').value=dayId;
  document.getElementById('renameInput').value=day.name;
  document.getElementById('renameModal').classList.add('open');
  setTimeout(()=>document.getElementById('renameInput').focus(),100);
}
function closeRename(){document.getElementById('renameModal').classList.remove('open');}
function saveRename(){
  const id=document.getElementById('renameDayId').value;
  const name=document.getElementById('renameInput').value.trim();
  if(!name)return;
  const day=data.days.find(d=>d.id===id);
  if(day)day.name=name;
  persist();closeRename();renderProgram();
}

function renderProgram(){
  const grid=document.getElementById('programGrid');
  if(data.days.length===0){
    grid.innerHTML=`<div class="empty-state"><div class="empty-title">No days yet</div>Add your first training day above to build your program.</div>`;
    return;
  }
  grid.innerHTML='';
  const pgrid=document.createElement('div');
  pgrid.className='program-grid';
  data.days.forEach(day=>{
    const card=document.createElement('div');
    card.className='day-card';
    card.innerHTML=`
      <div class="day-header">
        <div class="day-name">${day.name}</div>
        <div class="day-actions">
          <button class="btn btn-outline btn-sm" onclick="openRename('${day.id}')">Rename</button>
          <button class="btn btn-danger btn-sm" onclick="deleteDay('${day.id}')">Remove</button>
        </div>
      </div>
      <div class="exercise-list" id="exlist-${day.id}"></div>
      <div class="add-exercise-row">
        <input class="ex-input" id="ex-input-${day.id}" placeholder="Add exercise..." type="text">
        <button class="btn btn-green btn-sm" onclick="addExercise('${day.id}')">Add</button>
      </div>
    `;
    pgrid.appendChild(card);
    const list=card.querySelector(`#exlist-${day.id}`);
    day.exercises.forEach((ex,idx)=>{
      const item=document.createElement('div');
      item.className='exercise-item';
      item.draggable=true;
      item.dataset.dayId=day.id;
      item.dataset.exId=ex.id;
      item.innerHTML=`
        <span class="drag-handle" title="Drag to reorder">⠿</span>
        <span class="exercise-name">${ex.name}</span>
        <button class="exercise-del" onclick="deleteExercise('${day.id}','${ex.id}')">×</button>
      `;
      item.addEventListener('dragstart',e=>{dragSrc=item;item.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
      item.addEventListener('dragend',()=>{item.classList.remove('dragging');document.querySelectorAll('.exercise-item').forEach(i=>i.classList.remove('drag-over'));});
      item.addEventListener('dragover',e=>{e.preventDefault();if(dragSrc&&dragSrc!==item&&dragSrc.dataset.dayId===item.dataset.dayId){item.classList.add('drag-over');}});
      item.addEventListener('dragleave',()=>item.classList.remove('drag-over'));
      item.addEventListener('drop',e=>{
        e.preventDefault();item.classList.remove('drag-over');
        if(!dragSrc||dragSrc===item||dragSrc.dataset.dayId!==item.dataset.dayId)return;
        const d=data.days.find(x=>x.id===day.id);
        const srcIdx=d.exercises.findIndex(x=>x.id===dragSrc.dataset.exId);
        const tgtIdx=d.exercises.findIndex(x=>x.id===item.dataset.exId);
        const [moved]=d.exercises.splice(srcIdx,1);
        d.exercises.splice(tgtIdx,0,moved);
        persist();renderProgram();
      });
      list.appendChild(item);
    });
    const inp=card.querySelector(`#ex-input-${day.id}`);
    inp.addEventListener('keydown',e=>{if(e.key==='Enter')addExercise(day.id);});
  });
  grid.appendChild(pgrid);
}

// ── LOG ──
function renderLog(){
  const sel=document.getElementById('logDaySel');
  if(data.days.length===0){
    sel.innerHTML='<div class="empty-state" style="grid-column:1/-1"><div class="empty-title">No days in program</div>Go to the Program tab to build your training days first.</div>';
    document.getElementById('logForm').innerHTML='';
    return;
  }
  sel.innerHTML=data.days.map(d=>`
    <button class="day-btn${selectedDayId===d.id?' selected':''}" onclick="selectDay('${d.id}')">
      <div class="day-btn-name">${d.name}</div>
      <div class="day-btn-count">${d.exercises.length} exercise${d.exercises.length!==1?'s':''}</div>
    </button>`).join('');
  if(selectedDayId&&!data.days.find(d=>d.id===selectedDayId))selectedDayId=null;
  renderLogForm();
}

function selectDay(id){selectedDayId=id;renderLog();}

function renderLogForm(){
  const form=document.getElementById('logForm');
  if(!selectedDayId){form.innerHTML='';return;}
  const day=data.days.find(d=>d.id===selectedDayId);
  if(!day||day.exercises.length===0){
    form.innerHTML='<div class="empty-state">This day has no exercises. Add some in the Program tab.</div>';
    return;
  }
  const today=new Date().toISOString().split('T')[0];
  form.innerHTML=`
    <div class="log-form">
      <div class="log-date-row">
        <label>Session date</label>
        <input class="fdate" id="logDate" type="date" value="${today}">
      </div>
      ${day.exercises.map(ex=>`
        <div class="exercise-log-block">
          <div class="ex-log-name">${ex.name}</div>
          <table class="sets-table">
            <thead><tr><th>Set</th><th>Weight (lbs)</th><th>Reps</th><th></th></tr></thead>
            <tbody id="sets-${ex.id}"></tbody>
          </table>
          <button class="add-set-btn" onclick="addSet('${ex.id}')">+ Add set</button>
        </div>`).join('')}
      <div style="margin-top:1.2rem">
        <button class="btn btn-green" onclick="saveSession()" style="width:100%">Save session</button>
      </div>
    </div>
  `;
  day.exercises.forEach(ex=>addSet(ex.id));
}

let setCounters={};
function addSet(exId){
  if(!setCounters[exId])setCounters[exId]=0;
  setCounters[exId]++;
  const n=setCounters[exId];
  const tbody=document.getElementById('sets-'+exId);
  if(!tbody)return;
  const tr=document.createElement('tr');
  tr.id=`set-row-${exId}-${n}`;
  tr.innerHTML=`
    <td>${n}</td>
    <td><input class="set-input" id="w-${exId}-${n}" type="number" placeholder="0" min="0" step="2.5"></td>
    <td><input class="set-input" id="r-${exId}-${n}" type="number" placeholder="0" min="0"></td>
    <td><button class="set-del" onclick="removeSet('${exId}',${n})">×</button></td>
  `;
  tbody.appendChild(tr);
}

function removeSet(exId,n){
  const row=document.getElementById(`set-row-${exId}-${n}`);
  if(row)row.remove();
}

function saveSession(){
  const date=document.getElementById('logDate').value;
  if(!date||!selectedDayId)return;
  const day=data.days.find(d=>d.id===selectedDayId);
  const exercises=[];
  day.exercises.forEach(ex=>{
    const sets=[];
    let i=1;
    while(true){
      const wEl=document.getElementById(`w-${ex.id}-${i}`);
      const rEl=document.getElementById(`r-${ex.id}-${i}`);
      if(!wEl)break;
      const w=parseFloat(wEl.value)||0;
      const r=parseInt(rEl.value)||0;
      if(w>0||r>0)sets.push({weight:w,reps:r});
      i++;
    }
    if(sets.length>0)exercises.push({id:ex.id,name:ex.name,sets});
  });
  if(exercises.length===0){alert('Log at least one set before saving.');return;}
  data.sessions.push({id:uid(),date,dayId:selectedDayId,dayName:day.name,exercises});
  persist();
  setCounters={};
  alert(`Session saved — ${day.name} on ${date}`);
  renderLogForm();
}

// ── HISTORY ──
function getAllExercises(){
  const map={};
  data.sessions.forEach(s=>{
    s.exercises.forEach(ex=>{
      if(!map[ex.name])map[ex.name]={name:ex.name,sessions:[]};
      const best=Math.max(...ex.sets.map(s=>s.weight*s.reps));
      const bestSet=ex.sets.reduce((a,b)=>b.weight>a.weight?b:a,ex.sets[0]);
      map[ex.name].sessions.push({date:s.date,sets:ex.sets,best:bestSet,volume:ex.sets.reduce((a,b)=>a+b.weight*b.reps,0)});
    });
  });
  return Object.values(map).sort((a,b)=>a.name.localeCompare(b.name));
}

let chartObj=null;
function showExHistory(name){
  const exercises=getAllExercises();
  const ex=exercises.find(e=>e.name===name);
  if(!ex)return;
  selectedHistoryEx=name;
  const detail=document.getElementById('historyDetail');
  detail.classList.add('visible');
  const sorted=[...ex.sessions].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const labels=sorted.map(s=>new Date(s.date).toLocaleDateString('en-US',{month:'short',day:'numeric'}));
  const weights=sorted.map(s=>s.best.weight);
  detail.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
      <div style="font-family:var(--font-serif);font-style:italic;font-size:22px">${name}</div>
      <button class="btn btn-outline btn-sm" onclick="closeHistory()">Close</button>
    </div>
    <div class="chart-wrap"><canvas id="historyChart"></canvas></div>
    <div class="session-log">
      <div style="font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text4);margin-bottom:8px">Session history</div>
      ${[...sorted].reverse().map(s=>`
        <div class="session-row">
          <span class="session-date">${new Date(s.date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</span>
          <span class="session-best">${s.best.weight}lbs × ${s.best.reps}</span>
          <span style="color:var(--text4);font-size:11px">${s.sets.length} sets</span>
        </div>`).join('')}
    </div>
  `;
  detail.scrollIntoView({behavior:'smooth',block:'start'});
  setTimeout(()=>{
    if(chartObj)chartObj.destroy();
    const ctx=document.getElementById('historyChart');
    if(!ctx)return;
    chartObj=new Chart(ctx,{
      type:'line',
      data:{labels,datasets:[{label:'Best weight (lbs)',data:weights,borderColor:'#166534',backgroundColor:'rgba(22,101,52,.08)',borderWidth:2,pointBackgroundColor:'#166534',pointRadius:4,tension:.3,fill:true}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'#f7ede0',borderColor:'#c8b490',borderWidth:1,titleColor:'#6e5e48',bodyColor:'#1c1510',callbacks:{label:c=>` ${c.parsed.y} lbs`}}},scales:{x:{ticks:{color:'#9e8c74',font:{size:10,family:'DM Mono'}},grid:{color:'#dccaa8'}},y:{ticks:{color:'#9e8c74',font:{size:10,family:'DM Mono'},callback:v=>v+'lbs'},grid:{color:'#dccaa8'}}}}
    });
  },100);
}

function closeHistory(){
  document.getElementById('historyDetail').classList.remove('visible');
  selectedHistoryEx=null;
  if(chartObj){chartObj.destroy();chartObj=null;}
}

function renderHistory(){
  const exercises=getAllExercises();
  const grid=document.getElementById('historyGrid');
  if(exercises.length===0){
    grid.innerHTML='<div class="empty-state"><div class="empty-title">No sessions yet</div>Log your first workout to see history here.</div>';
    return;
  }
  grid.innerHTML=exercises.map(ex=>{
    const sorted=[...ex.sessions].sort((a,b)=>new Date(a.date)-new Date(b.date));
    const latest=sorted[sorted.length-1];
    const pr=sorted.reduce((a,b)=>b.best.weight>a.best.weight?b:a,sorted[0]);
    return`<div class="history-card" onclick="showExHistory('${ex.name.replace(/'/g,'\\\'')}')" >
      <div class="history-ex-name">${ex.name}</div>
      <div class="history-meta">${ex.sessions.length} session${ex.sessions.length!==1?'s':''} · PR: ${pr.best.weight}lbs × ${pr.best.reps}</div>
      <div style="font-size:11px;color:var(--text3)">Last: ${latest.best.weight}lbs × ${latest.best.reps} on ${new Date(latest.date).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>
    </div>`;
  }).join('');
}

document.getElementById('renameModal').addEventListener('click',e=>{if(e.target===document.getElementById('renameModal'))closeRename();});
document.getElementById('renameInput').addEventListener('keydown',e=>{if(e.key==='Enter')saveRename();});
document.getElementById('newDayName').addEventListener('keydown',e=>{if(e.key==='Enter')addDay();});

async function init(){data=await load();renderProgram();renderLog();}
init();
</script>
